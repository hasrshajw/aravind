<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Canteen Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Custom scrollbar for a polished look */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <!-- Main Application Container -->
    <div id="app"></div>

    <script>
        // --- STATE MANAGEMENT ---
        const defaultItems = [
            { id: 1, name: "Masala Dosa", price: 60, icon: "🥞", category: "Breakfast" },
            { id: 2, name: "Veg Burger", price: 85, icon: "🍔", category: "Snacks" },
            { id: 3, name: "Filter Coffee", price: 25, icon: "☕", category: "Beverages" },
            { id: 4, name: "Chicken Biryani", price: 150, icon: "🍛", category: "Lunch" },
            { id: 5, name: "French Fries", price: 70, icon: "🍟", category: "Snacks" },
            { id: 6, name: "Cold Drink", price: 40, icon: "🥤", category: "Beverages" }
        ];

        const defaultOrders = [
            { id: 101, studentName: "Rahul K.", items: [{name: "Veg Burger", qty: 1}, {name: "Cold Drink", qty: 1}], total: 125, status: "Pending", time: new Date(Date.now() - 600000).toLocaleTimeString() },
            { id: 102, studentName: "Priya S.", items: [{name: "Masala Dosa", qty: 2}, {name: "Filter Coffee", qty: 2}], total: 170, status: "Preparing", time: new Date(Date.now() - 1200000).toLocaleTimeString() },
            { id: 103, studentName: "Amit J.", items: [{name: "Chicken Biryani", qty: 1}], total: 150, status: "Ready", time: new Date(Date.now() - 1800000).toLocaleTimeString() }
        ];

        const state = {
            currentUser: null, // 'student' or 'admin'
            currentView: 'login', // 'login', 'student_menu', 'student_cart', 'student_orders', 'admin_orders', 'admin_menu'
            cart: [],
            items: JSON.parse(localStorage.getItem('canteen_items')) || defaultItems,
            orders: JSON.parse(localStorage.getItem('canteen_orders')) || defaultOrders,
            studentName: "Guest Student"
        };

        // --- LOCAL STORAGE SYNC ---
        function saveState() {
            localStorage.setItem('canteen_items', JSON.stringify(state.items));
            localStorage.setItem('canteen_orders', JSON.stringify(state.orders));
        }

        // Syncs data across different browser tabs in real-time
        window.addEventListener('storage', (e) => {
            if (e.key === 'canteen_items') state.items = JSON.parse(e.newValue);
            if (e.key === 'canteen_orders') state.orders = JSON.parse(e.newValue);
            render();
        });

        // --- CORE FUNCTIONS ---
        function render() {
            const app = document.getElementById('app');
            app.innerHTML = '';

            if (state.currentView === 'login') {
                app.innerHTML = renderLogin();
            } else {
                app.innerHTML = `
                    ${renderNavbar()}
                    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 fade-in">
                        ${renderCurrentView()}
                    </main>
                `;
            }
        }

        function setView(view) {
            state.currentView = view;
            render();
        }

        function login(role) {
            state.currentUser = role;
            if (role === 'student') setView('student_menu');
            if (role === 'admin') setView('admin_orders');
        }

        function logout() {
            state.currentUser = null;
            state.cart = [];
            setView('login');
        }

        // --- STUDENT FUNCTIONS ---
        function addToCart(itemId) {
            const item = state.items.find(i => i.id === itemId);
            const existing = state.cart.find(c => c.id === itemId);
            if (existing) {
                existing.qty++;
            } else {
                state.cart.push({ ...item, qty: 1 });
            }
            render();
            showToast(`Added ${item.name} to cart!`);
        }

        function removeFromCart(itemId) {
            state.cart = state.cart.filter(c => c.id !== itemId);
            render();
        }

        function processPayment(event) {
            event.preventDefault();
            if (state.cart.length === 0) return;

            const total = state.cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            const newOrder = {
                id: Math.floor(Math.random() * 900) + 100,
                studentName: state.studentName,
                items: [...state.cart],
                total: total,
                status: "Pending",
                time: new Date().toLocaleTimeString()
            };

            state.orders.unshift(newOrder); // Add to beginning
            state.cart = []; // Clear cart
            saveState(); // Save to LocalStorage
            
            showToast("Payment Successful! Order Placed.");
            setView('student_orders');
        }

        // --- ADMIN FUNCTIONS ---
        function updateOrderStatus(orderId, newStatus) {
            const order = state.orders.find(o => o.id === orderId);
            if (order) {
                order.status = newStatus;
                saveState(); // Save to LocalStorage
                render();
                showToast(`Order #${orderId} marked as ${newStatus}`);
            }
        }

        function addNewItem(event) {
            event.preventDefault();
            const name = document.getElementById('itemName').value;
            const price = parseInt(document.getElementById('itemPrice').value);
            const icon = document.getElementById('itemIcon').value || '🍽️';
            const category = document.getElementById('itemCategory').value;

            const newItem = {
                id: Date.now(),
                name, price, icon, category
            };
            state.items.push(newItem);
            saveState(); // Save to LocalStorage
            render();
            showToast("New item added to menu!");
        }

        function deleteItem(itemId) {
            if(confirm("Are you sure you want to delete this item?")) {
                state.items = state.items.filter(i => i.id !== itemId);
                saveState(); // Save to LocalStorage
                render();
            }
        }

        // --- UI COMPONENTS ---
        function renderLogin() {
            return `
                <div class="min-h-screen flex items-center justify-center bg-slate-100 p-4">
                    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden fade-in">
                        <div class="bg-indigo-600 p-6 text-center">
                            <i class="fas fa-hamburger text-4xl text-white mb-2"></i>
                            <h1 class="text-2xl font-bold text-white">Campus Canteen</h1>
                            <p class="text-indigo-200 mt-1">Select your portal</p>
                        </div>
                        <div class="p-8 space-y-4">
                            <button onclick="login('student')" class="w-full flex items-center justify-center space-x-3 bg-white border-2 border-slate-200 hover:border-indigo-500 hover:bg-indigo-50 text-slate-700 py-3 px-4 rounded-xl transition font-medium">
                                <i class="fas fa-user-graduate text-indigo-500"></i>
                                <span>Login as Student</span>
                            </button>
                            <button onclick="login('admin')" class="w-full flex items-center justify-center space-x-3 bg-white border-2 border-slate-200 hover:border-amber-500 hover:bg-amber-50 text-slate-700 py-3 px-4 rounded-xl transition font-medium">
                                <i class="fas fa-store text-amber-500"></i>
                                <span>Login as Canteen Admin</span>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderNavbar() {
            const isStudent = state.currentUser === 'student';
            const cartCount = state.cart.reduce((sum, item) => sum + item.qty, 0);

            let links = '';
            if (isStudent) {
                links = `
                    <button onclick="setView('student_menu')" class="${state.currentView === 'student_menu' ? 'text-indigo-600 border-b-2 border-indigo-600' : 'text-slate-600 hover:text-indigo-600'} px-3 py-2 font-medium transition">Menu</button>
                    <button onclick="setView('student_orders')" class="${state.currentView === 'student_orders' ? 'text-indigo-600 border-b-2 border-indigo-600' : 'text-slate-600 hover:text-indigo-600'} px-3 py-2 font-medium transition">My Orders</button>
                    <button onclick="setView('student_cart')" class="${state.currentView === 'student_cart' ? 'text-indigo-600 border-b-2 border-indigo-600' : 'text-slate-600 hover:text-indigo-600'} px-3 py-2 font-medium transition relative">
                        <i class="fas fa-shopping-cart"></i> Cart
                        ${cartCount > 0 ? `<span class="absolute top-0 right-0 -mt-1 -mr-2 bg-red-500 text-white text-xs font-bold rounded-full h-5 w-5 flex items-center justify-center">${cartCount}</span>` : ''}
                    </button>
                `;
            } else {
                links = `
                    <button onclick="setView('admin_orders')" class="${state.currentView === 'admin_orders' ? 'text-amber-600 border-b-2 border-amber-600' : 'text-slate-600 hover:text-amber-600'} px-3 py-2 font-medium transition">Live Orders</button>
                    <button onclick="setView('admin_menu')" class="${state.currentView === 'admin_menu' ? 'text-amber-600 border-b-2 border-amber-600' : 'text-slate-600 hover:text-amber-600'} px-3 py-2 font-medium transition">Manage Menu</button>
                `;
            }

            return `
                <nav class="bg-white shadow-sm sticky top-0 z-50">
                    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div class="flex justify-between h-16">
                            <div class="flex items-center">
                                <i class="fas fa-hamburger text-2xl ${isStudent ? 'text-indigo-600' : 'text-amber-500'} mr-2"></i>
                                <span class="font-bold text-xl text-slate-800 hidden sm:block">Campus Canteen</span>
                            </div>
                            <div class="flex items-center space-x-2 sm:space-x-6">
                                ${links}
                                <button onclick="logout()" class="ml-4 text-slate-400 hover:text-red-500 transition">
                                    <i class="fas fa-sign-out-alt"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </nav>
            `;
        }

        function renderCurrentView() {
            switch(state.currentView) {
                case 'student_menu': return renderStudentMenu();
                case 'student_cart': return renderStudentCart();
                case 'student_orders': return renderStudentOrders();
                case 'admin_orders': return renderAdminOrders();
                case 'admin_menu': return renderAdminMenu();
                default: return '';
            }
        }

        // --- STUDENT VIEWS ---
        function renderStudentMenu() {
            let itemsHtml = state.items.map(item => `
                <div class="bg-white rounded-xl shadow-sm hover:shadow-md transition-shadow p-5 border border-slate-100 flex flex-col">
                    <div class="text-5xl text-center mb-4">${item.icon}</div>
                    <div class="mt-auto">
                        <span class="text-xs font-semibold text-indigo-500 uppercase tracking-wider">${item.category}</span>
                        <h3 class="text-lg font-bold text-slate-800 mt-1">${item.name}</h3>
                        <div class="flex items-center justify-between mt-4">
                            <span class="text-xl font-bold text-slate-800">₹${item.price}</span>
                            <button onclick="addToCart(${item.id})" class="bg-indigo-50 text-indigo-600 hover:bg-indigo-600 hover:text-white px-4 py-2 rounded-lg font-medium transition">
                                Add <i class="fas fa-plus ml-1 text-sm"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');

            return `
                <div class="mb-6">
                    <h2 class="text-2xl font-bold text-slate-800">Today's Menu</h2>
                    <p class="text-slate-500">Fresh and delicious food ready for you.</p>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                    ${itemsHtml}
                </div>
            `;
        }

        function renderStudentCart() {
            if (state.cart.length === 0) {
                return `
                    <div class="text-center py-20">
                        <i class="fas fa-shopping-basket text-6xl text-slate-300 mb-4"></i>
                        <h2 class="text-2xl font-bold text-slate-700">Your cart is empty</h2>
                        <p class="text-slate-500 mt-2">Looks like you haven't added anything yet.</p>
                        <button onclick="setView('student_menu')" class="mt-6 bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg font-medium transition">Browse Menu</button>
                    </div>
                `;
            }

            const total = state.cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            
            let cartItemsHtml = state.cart.map(item => `
                <div class="flex items-center justify-between p-4 border-b border-slate-100 last:border-0">
                    <div class="flex items-center space-x-4">
                        <div class="text-3xl">${item.icon}</div>
                        <div>
                            <h4 class="font-bold text-slate-800">${item.name}</h4>
                            <p class="text-sm text-slate-500">₹${item.price} x ${item.qty}</p>
                        </div>
                    </div>
                    <div class="flex items-center space-x-4">
                        <span class="font-bold text-slate-800">₹${item.price * item.qty}</span>
                        <button onclick="removeFromCart(${item.id})" class="text-red-400 hover:text-red-600"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');

            return `
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2">
                        <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
                            <div class="p-4 bg-slate-50 border-b border-slate-100">
                                <h3 class="font-bold text-slate-800">Order Items</h3>
                            </div>
                            ${cartItemsHtml}
                        </div>
                    </div>
                    <div>
                        <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-6 sticky top-24">
                            <h3 class="font-bold text-slate-800 mb-4 text-xl">Payment Summary</h3>
                            <div class="space-y-3 text-sm text-slate-600 mb-4 border-b border-slate-100 pb-4">
                                <div class="flex justify-between"><span>Subtotal</span><span>₹${total}</span></div>
                                <div class="flex justify-between"><span>Taxes (5%)</span><span>₹${(total * 0.05).toFixed(2)}</span></div>
                            </div>
                            <div class="flex justify-between items-center mb-6">
                                <span class="font-bold text-slate-800 text-lg">Total</span>
                                <span class="font-bold text-indigo-600 text-2xl">₹${(total * 1.05).toFixed(2)}</span>
                            </div>
                            <form onsubmit="processPayment(event)">
                                <div class="mb-4">
                                    <label class="block text-sm font-medium text-slate-700 mb-1">Select Payment Method</label>
                                    <select class="w-full border border-slate-300 rounded-lg p-2.5 outline-none focus:border-indigo-500" required>
                                        <option value="">Choose...</option>
                                        <option value="upi">UPI / QR Code</option>
                                        <option value="card">Credit/Debit Card</option>
                                    </select>
                                </div>
                                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition shadow-md shadow-indigo-200">
                                    Pay Now
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderStudentOrders() {
            const myOrders = state.orders.filter(o => o.studentName === state.studentName);
            
            if (myOrders.length === 0) {
                return `<div class="text-center py-20 text-slate-500">You have no past orders.</div>`;
            }

            const getStatusColor = (status) => {
                switch(status) {
                    case 'Pending': return 'bg-yellow-100 text-yellow-800 border-yellow-200';
                    case 'Preparing': return 'bg-blue-100 text-blue-800 border-blue-200';
                    case 'Ready': return 'bg-green-100 text-green-800 border-green-200';
                    default: return 'bg-slate-100 text-slate-800 border-slate-200';
                }
            };

            let ordersHtml = myOrders.map(order => `
                <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-5 mb-4 flex flex-col sm:flex-row sm:items-center justify-between">
                    <div>
                        <div class="flex items-center space-x-3 mb-2">
                            <span class="font-bold text-slate-800 text-lg">Order #${order.id}</span>
                            <span class="px-2.5 py-0.5 rounded-full text-xs font-medium border ${getStatusColor(order.status)}">${order.status}</span>
                        </div>
                        <p class="text-sm text-slate-500 mb-2"><i class="far fa-clock mr-1"></i> ${order.time}</p>
                        <p class="text-slate-700 text-sm">
                            ${order.items.map(i => `${i.qty}x ${i.name}`).join(', ')}
                        </p>
                    </div>
                    <div class="mt-4 sm:mt-0 text-right">
                        <div class="text-xl font-bold text-slate-800">₹${order.total}</div>
                    </div>
                </div>
            `).join('');

            return `
                <div class="max-w-3xl mx-auto">
                    <h2 class="text-2xl font-bold text-slate-800 mb-6">Order History</h2>
                    ${ordersHtml}
                </div>
            `;
        }

        // --- ADMIN VIEWS ---
        function renderAdminOrders() {
            if (state.orders.length === 0) {
                return `<div class="text-center py-20 text-slate-500">No active orders right now.</div>`;
            }

            let ordersHtml = state.orders.map(order => {
                let actionButtons = '';
                if (order.status === 'Pending') {
                    actionButtons = `<button onclick="updateOrderStatus(${order.id}, 'Preparing')" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition">Mark Preparing</button>`;
                } else if (order.status === 'Preparing') {
                    actionButtons = `<button onclick="updateOrderStatus(${order.id}, 'Ready')" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition">Mark Ready</button>`;
                } else if (order.status === 'Ready') {
                    actionButtons = `<button onclick="updateOrderStatus(${order.id}, 'Completed')" class="bg-slate-800 hover:bg-slate-900 text-white px-4 py-2 rounded-lg text-sm font-medium transition">Complete Order</button>`;
                } else {
                    actionButtons = `<span class="text-slate-400 italic text-sm"><i class="fas fa-check-circle"></i> Completed</span>`;
                }

                const statusColors = {
                    'Pending': 'bg-yellow-100 text-yellow-800',
                    'Preparing': 'bg-blue-100 text-blue-800',
                    'Ready': 'bg-green-100 text-green-800',
                    'Completed': 'bg-slate-100 text-slate-600'
                };

                return `
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                        <div class="flex justify-between items-start mb-4 border-b border-slate-100 pb-4">
                            <div>
                                <h3 class="font-bold text-lg text-slate-800">Order #${order.id}</h3>
                                <p class="text-sm text-slate-500"><i class="far fa-user mr-1"></i> ${order.studentName} &nbsp;|&nbsp; <i class="far fa-clock mr-1"></i> ${order.time}</p>
                            </div>
                            <span class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider ${statusColors[order.status]}">${order.status}</span>
                        </div>
                        <div class="mb-4">
                            <ul class="space-y-2">
                                ${order.items.map(item => `
                                    <li class="flex justify-between text-sm text-slate-700">
                                        <span><span class="font-bold text-slate-900">${item.qty}x</span> ${item.name}</span>
                                    </li>
                                `).join('')}
                            </ul>
                            <div class="mt-4 pt-3 border-t border-slate-100 flex justify-between items-center">
                                <span class="text-sm font-medium text-slate-500">Total</span>
                                <span class="font-bold text-slate-800">₹${order.total}</span>
                            </div>
                        </div>
                        <div class="flex justify-end pt-2">
                            ${actionButtons}
                        </div>
                    </div>
                `;
            }).join('');

            return `
                <div class="mb-6 flex justify-between items-center">
                    <div>
                        <h2 class="text-2xl font-bold text-slate-800">Kitchen Dashboard</h2>
                        <p class="text-slate-500">Manage and prepare live orders.</p>
                    </div>
                    <button onclick="render()" class="text-amber-600 hover:bg-amber-50 px-3 py-2 rounded-lg transition">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    ${ordersHtml}
                </div>
            `;
        }

        function renderAdminMenu() {
            let itemsHtml = state.items.map(item => `
                <div class="flex items-center justify-between p-4 border-b border-slate-100 hover:bg-slate-50 transition">
                    <div class="flex items-center space-x-4">
                        <div class="text-2xl bg-white h-10 w-10 flex items-center justify-center rounded-full shadow-sm">${item.icon}</div>
                        <div>
                            <h4 class="font-bold text-slate-800">${item.name}</h4>
                            <p class="text-xs text-slate-500 uppercase tracking-wide">${item.category}</p>
                        </div>
                    </div>
                    <div class="flex items-center space-x-6">
                        <span class="font-bold text-slate-800">₹${item.price}</span>
                        <button onclick="deleteItem(${item.id})" class="text-red-400 hover:text-red-600 transition bg-red-50 h-8 w-8 rounded flex items-center justify-center" title="Delete Item">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                </div>
            `).join('');

            return `
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2">
                        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            <div class="p-5 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
                                <h3 class="font-bold text-slate-800 text-lg">Current Menu Items</h3>
                                <span class="bg-amber-100 text-amber-800 text-xs font-bold px-2 py-1 rounded">${state.items.length} Items</span>
                            </div>
                            <div class="divide-y divide-slate-100">
                                ${itemsHtml}
                            </div>
                        </div>
                    </div>
                    <div>
                        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 sticky top-24">
                            <h3 class="font-bold text-slate-800 mb-4 text-lg border-b border-slate-100 pb-2">Add New Item</h3>
                            <form onsubmit="addNewItem(event)" class="space-y-4">
                                <div>
                                    <label class="block text-sm font-medium text-slate-700 mb-1">Item Name</label>
                                    <input type="text" id="itemName" required class="w-full border border-slate-300 rounded-lg p-2.5 outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500" placeholder="e.g. Cheese Pizza">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-slate-700 mb-1">Price (₹)</label>
                                    <input type="number" id="itemPrice" required min="1" class="w-full border border-slate-300 rounded-lg p-2.5 outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500" placeholder="150">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-slate-700 mb-1">Category</label>
                                    <select id="itemCategory" required class="w-full border border-slate-300 rounded-lg p-2.5 outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500">
                                        <option value="Breakfast">Breakfast</option>
                                        <option value="Lunch">Lunch</option>
                                        <option value="Snacks">Snacks</option>
                                        <option value="Beverages">Beverages</option>
                                        <option value="Dessert">Dessert</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-slate-700 mb-1">Emoji Icon</label>
                                    <input type="text" id="itemIcon" class="w-full border border-slate-300 rounded-lg p-2.5 outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500" placeholder="🍕">
                                </div>
                                <button type="submit" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-2.5 rounded-lg transition mt-2">
                                    <i class="fas fa-plus mr-1"></i> Add to Menu
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- UTILS ---
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-5 right-5 bg-slate-800 text-white px-6 py-3 rounded-xl shadow-lg font-medium fade-in z-50 flex items-center space-x-2';
            toast.innerHTML = `<i class="fas fa-check-circle text-green-400"></i><span>${message}</span>`;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Initialize App
        window.onload = render;
    </script>
</body>
</html>
